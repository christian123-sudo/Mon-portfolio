<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Documentations - Portfolio</title>
    <style>
        /* Variables de couleur */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-main: #ffffff;
            --accent-color: #58a6ff;
            --accent-hover: #1f6feb;
            --border-color: #30363d;
        }

        /* Style Global */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: var(--text-main);
            margin: 0;
            font-size: 2rem;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* --- CARROUSEL INTERACTIF --- */
        .carousel-container {
            position: relative;
            max-width: 900px;
            margin: 0 auto 60px auto;
            overflow: hidden;
            padding: 10px 0;
        }

        .carousel-track {
            display: flex;
            gap: 20px;
            transition: transform 0.5s ease-in-out;
            width: max-content;
        }

        .doc-card-carousel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            width: 260px; /* Taille fixe pour l'alignement */
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s, border-color 0.3s;
        }

        .doc-card-carousel:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .doc-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .doc-card-carousel h3 {
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-size: 1.3rem;
        }

        .doc-card-carousel p {
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .btn-doc {
            display: inline-block;
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .btn-doc:hover {
            background-color: var(--accent-hover);
        }

        /* Boutons de Navigation du Carrousel */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(22, 27, 34, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1.5rem;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
            transition: background-color 0.2s, color 0.2s;
        }

        .carousel-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        /* --- GRILLE DES PROJETS --- */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .project-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s;
        }

        .project-card:hover {
            transform: scale(1.02);
        }

        .project-card h3 {
            color: var(--text-main);
            margin-top: 0;
        }

        .project-tags {
            margin: 15px 0;
        }

        .tag {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 5px;
            display: inline-block;
        }

        .btn-back {
            display: block;
            width: max-content;
            margin: 40px auto 0 auto;
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn-back:hover {
            background-color: var(--accent-color);
            color: white;
        }

        footer {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mon Espace Documentations & Projets</h1>
    </header>

    <main>
        <h2>Mes Documentations & Certifications</h2>

            <button class="carousel-btn prev-btn" id="prevBtn">&#10094;</button>
            <div class="carousel-track" id="carouselTrack">
